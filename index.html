<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>神秘语法检测器</title>
    <style>
        body {
            background-color: #d2efff;
        }
        .title{
            text-align: center;
            transform: translateY(18px);
        }
        .input{
            position: absolute;
            top:15%;
            left: 5%;
        }
        .inputText{
            background-color: #ffffff;
            width: 580px;
            height: 300px;
            padding: 1%;
            border: 3px solid #5ce1e6;
            border-radius: 10px;
            padding: 20px;
            font-family: "Arial";
            font-size: medium;
            resize: none;
            
        }
        textarea:focus {
            outline: none;
        }
        .output{
            position: absolute;
            top:15%;
            right: 5%;
            background-color: #c2dcff;
            width: 595px;
            height: 450px;
            padding: 1%;
            border: 3px solid #d9d9d9;
            border-radius: 10px;
            
        }
    </style>
  </head>
  <body>
    <div class = "title">
        <h1>TFLS 语法纠正程序</h1>
    </div>
    <div class = "input">
        <textarea class="inputText" type="text" placeholder="请粘贴需要检测的文本，或上传文件后检测"></textarea>
    </div>
    <div class = "output">
        <p>结果展示</p>
    </div>
  </body>
</html>
