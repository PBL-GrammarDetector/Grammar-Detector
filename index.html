<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>神秘语法检测器</title>
    <style>
        body {
            background-color: #d2efff;
        }
        .title{
            text-align: center;
            transform: translateY(18px);
        }
        .input{
            position: absolute;
            top:15%;
            left: 5%;
        }
        .inputText{
            background-color: #ffffff;
            width: 580px;
            height: 300px;
            padding: 1%;
            border: 3px solid #5ce1e6;
            border-radius: 10px;
            padding: 20px;
            font-family: "Arial";
            font-size: medium;
            resize: none;
            
        }
        textarea:focus {
            outline: none;
        }
        .output{
            position: absolute;
            top:15%;
            right: 5%;
            background-color: #c2dcff;
            width: 595px;
            height: 450px;
            padding: 1%;
            border: 3px solid #d9d9d9;
            border-radius: 10px;
            
        }
        .output p {
            font-size: 20px;
            color: #666;
            margin-left: 10px;
            margin-top: 10px;
        }
    </style>
  </head>
  <body>
    <div class = "title">
        <h1>TFLS 语法纠正程序</h1>
    </div>
    <div class = "input">
        <textarea class="inputText" type="text" placeholder="请粘贴需要检测的文本，或上传文件后检测"></textarea>
    </div>
    <div class = "output">
        <p>结果展示</p>
    </div>
  <div style="position: absolute; top: 480px; left: 60px; display: flex; gap: 20px;">
    <button style="background-color: #0078d7; color: white; border: none; border-radius: 8px; padding: 10px 30px; font-size: 18px; font-weight: bold; cursor: pointer;">语法检查</button>
    <button style="background-color: #0078d7; color: white; border: none; border-radius: 8px; padding: 10px 30px; font-size: 18px; font-weight: bold; cursor: pointer;">上传附件</button>
    <button style="background-color: #0078d7; color: white; border: none; border-radius: 8px; padding: 10px 30px; font-size: 18px; font-weight: bold; cursor: pointer;">重置</button>
  </div>
  <div style="
    position: absolute; 
    top: 540px; 
    left: 60px; 
    font-size: 16px;
    color: #666;
    ">提示文字：<br>
    点击左侧[语法检查]按钮，即可查看语法问题及知识点讲解
  </div>
  <div style="
    position: absolute; 
    top: 560px; 
    right: 80px; 
    font-size: 16px; 
    color: #333;
    margin-right: 5px;
    ">检测结果仅供参考
    </div>
  <div style="
    margin-top: 5px;
    position: absolute; 
    top: 620px; 
    right: 80px; 
    display: flex; 
    gap: 20px; 
    font-size: 16px;">
    <a href="#" style="color: #333; text-decoration: none; background: #b0d9ff; padding: 5px 10px; border-radius: 4px;">使用帮助</a>
    <a href="#" style="color: #333; text-decoration: none; background: #b0d9ff; padding: 5px 10px; border-radius: 4px;">常见问题</a>
    <a href="#" style="color: #333; text-decoration: none; background: #b0d9ff; padding: 5px 10px; border-radius: 4px;">关于我们</a>
    <a href="#" style="color: #333; text-decoration: none; background: #b0d9ff; padding: 5px 10px; border-radius: 4px;">反馈问题</a>
  </div>
  </body>
</html>
