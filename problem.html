<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题反馈 - TFLS语法纠正程序</title>
    <style>
        body {
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            background-color: #d2efff;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #5ce1e6;
            color: #0078d7;
        }
        h2 {
            font-size: 18px;
            margin: 25px 0 10px 0;
            color: #0078d7;
        }
        p {
            margin: 10px 0;
        }
        ul {
            margin: 10px 0 10px 25px;
        }
        li {
            margin: 6px 0;
        }
        .note {
            background: #f0f7ff;
            border-left: 4px solid #0078d7;
            padding: 12px 16px;
            margin: 20px 0;
            font-size: 14px;
        }
        hr {
            margin: 30px 0;
            border: none;
            border-top: 1px solid #e0e0e0;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #0078d7;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .version {
            font-family: monospace;
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>反馈问题</h1>
        
        <p>在使用中遇到问题属正常情况，欢迎反馈问题！</p>
        
        <h2>我可以怎么反馈问题</h2>
        <ul>
            <li>如果想评价这个网站，扫描这个二维码</li>
            <img src="https://pbl-grammardetector.github.io/Grammar-Detector/img/QR_GrammarCheck_Estimate_FORM.png" alt="二维码图片" width="150px" height="150px">
            
            <li>如果遇到的具体的问题，扫描这个二维码</li>
            <img src="https://pbl-grammardetector.github.io/Grammar-Detector/img/QR_GrammarChecker_Issue_FORM.png" alt="二维码图片" width="150px" height="150px">
            
            <li>如果你熟悉Github，还可以在<a href="https://github.com/PBL-GrammarDetector/Grammar-Detector/issues" target="_blank" rel="noopener">Github</a>上提交issue</li>
        </ul>
        
        <h2>联系方式</h2>
        <p>想要联系我们可以扫描二维码加微信群，也可以去<a href="https://github.com/PBL-GrammarDetector/Grammar-Detector" target="_blank" rel="noopener">Github</a>上留言</p>
        <ul>
            <li>微信群：</li>
        </ul>
        <img src="https://pbl-grammardetector.github.io/Grammar-Detector/img/QR_WXGroup_ValidTill260416.jpg" alt="二维码图片" width="175px" height="225px">
                
        <hr>
        
        <a href="#" class="back-link" onclick="window.close(); return false;">← 返回</a>
    </div>
    
    <script>
        if (document.referrer) {
            const backLink = document.querySelector('.back-link');
            backLink.href = document.referrer;
            backLink.onclick = null;
        }
    </script>
</body>
</html>
